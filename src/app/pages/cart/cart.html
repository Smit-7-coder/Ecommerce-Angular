<!-- ================= CART PAGE ================= -->

<div class="container my-5">

    <h2 class="fw-bold mb-4">
        🛒 Shopping Cart
    </h2>

    <div class="row">

        <!-- Cart Items -->
        <div class="col-lg-8">

            <div class="card shadow-sm border-0 rounded-4">

                <div class="card-body p-4">

                    <table class="table align-middle">

                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th width="170">Quantity</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr>

                                <td>
                                    <div class="d-flex align-items-center">

                                        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=200"
                                             width="80"
                                             class="rounded me-3">

                                        <div>
                                            <h6 class="mb-1">iPhone 16 Pro</h6>
                                            <small class="text-muted">
                                                Apple Smartphone
                                            </small>
                                        </div>

                                    </div>
                                </td>

                                <td>₹99,999</td>

                                <td>

                                    <div class="input-group">

                                        <button class="btn btn-outline-secondary">-</button>

                                        <input type="text"
                                               class="form-control text-center"
                                               value="1">

                                        <button class="btn btn-outline-secondary">+</button>

                                    </div>

                                </td>

                                <td class="fw-bold">
                                    ₹99,999
                                </td>

                                <td>
                                    <button class="btn btn-danger btn-sm">
                                        Remove
                                    </button>
                                </td>

                            </tr>

                            <tr>

                                <td>
                                    <div class="d-flex align-items-center">

                                        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=200"
                                             width="80"
                                             class="rounded me-3">

                                        <div>
                                            <h6 class="mb-1">MacBook Air</h6>
                                            <small class="text-muted">
                                                Apple Laptop
                                            </small>
                                        </div>

                                    </div>
                                </td>

                                <td>₹1,19,999</td>

                                <td>

                                    <div class="input-group">

                                        <button class="btn btn-outline-secondary">-</button>

                                        <input type="text"
                                               class="form-control text-center"
                                               value="1">

                                        <button class="btn btn-outline-secondary">+</button>

                                    </div>

                                </td>

                                <td class="fw-bold">
                                    ₹1,19,999
                                </td>

                                <td>
                                    <button class="btn btn-danger btn-sm">
                                        Remove
                                    </button>
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <!-- Order Summary -->

        <div class="col-lg-4 mt-4 mt-lg-0">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-4">

                    <h4 class="fw-bold mb-4">
                        Order Summary
                    </h4>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Subtotal</span>
                        <span>₹2,19,998</span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Shipping</span>
                        <span class="text-success">FREE</span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Discount</span>
                        <span>- ₹5,000</span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Total</span>
                        <span>₹2,14,998</span>
                    </div>

                    <div class="mt-4">

                        <input type="text"
                               class="form-control mb-3"
                               placeholder="Coupon Code">

                        <button class="btn btn-outline-primary w-100 mb-3">
                            Apply Coupon
                        </button>

                        <button class="btn btn-dark w-100 py-2">
                            Proceed to Checkout
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
